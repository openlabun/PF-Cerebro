name: cerebro
services:
  frontend:
    container_name: cerebro-frontend
    build:
      context: "./Diseno/IyR/Frontend"
      dockerfile: Dockerfile
    ports:
      - "5051:80"
    restart: unless-stopped
    depends_on:
      - cerebro-api

  cerebro-api:
    container_name: cerebro-api
    build:
      context: "./MVP-BackEnd/Contenedor1/api"
      dockerfile: Dockerfile
    env_file:
      - "./MVP-BackEnd/Contenedor1/api/.env"
    restart: unless-stopped

  contenedor2:
    container_name: cerebro-contenedor2
    build:
      context: "./MVP-BackEnd/Contenedor2"
      dockerfile: Dockerfile
    env_file:
      - "./MVP-BackEnd/Contenedor2/.env"
    environment:
      CONTENEDOR1_BASE_URL: "http://cerebro-api:3000/api"
    depends_on:
      - cerebro-api
    restart: unless-stopped

  backend-admin:
    container_name: cerebro-backend-admin
    build:
      context: "./MVP-BackEnd/ContenedorAdmin"
      dockerfile: Dockerfile
    env_file:
      - path: "./MVP-BackEnd/ContenedorAdmin/.env.example"
      - path: "./MVP-BackEnd/ContenedorAdmin/.env"
        required: false
      - path: "./MVP-BackEnd/Contenedor1/api/.env"
    environment:
      CONTENEDOR1_BASE_URL: "${CONTENEDOR1_BASE_URL:-http://cerebro-api:3000/api}"
      CONTENEDOR2_BASE_URL: "${CONTENEDOR2_BASE_URL:-http://contenedor2:3001}"
      PORT: "3001"
    expose:
      - "3001"
    depends_on:
      - cerebro-api
    restart: unless-stopped

  admin-dashboard:
    container_name: cerebro-admin-dashboard
    build:
      context: "./Diseno/AdminDashboard"
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5052:80"
    depends_on:
      - backend-admin
    restart: unless-stopped

  pvp-simulador:
    container_name: cerebro-pvp-simulador
    build:
      context: "./Diseno/PvP/simulador"
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    restart: unless-stopped
