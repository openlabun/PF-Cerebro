name: cerebro
services:
  frontend:
    container_name: cerebro-frontend
    build:
      context: "./Diseno/PvP/simulador"
      dockerfile: Dockerfile.frontend
      args:
        VITE_APP_BASE_PATH: "/"
    ports:
      - "5051:80"
    restart: unless-stopped
    depends_on:
      - cerebro-api
      - backend-pvp

  cerebro-api:
    container_name: cerebro-api
    build:
      context: "./Backend/AuthPersonalTrackingTorneos/api"
      dockerfile: Dockerfile
    env_file:
      - "./Backend/AuthPersonalTrackingTorneos/api/.env"
    restart: unless-stopped

  backend-pvp:
    container_name: cerebro-backend-pvp
    build:
      context: "./Backend/PvP"
      dockerfile: Dockerfile
    env_file:
      - "./Backend/PvP/.env"
    environment:
      CONTENEDOR1_BASE_URL: "http://cerebro-api:3000/api"
    depends_on:
      - cerebro-api
    restart: unless-stopped

  backend-admin:
    container_name: cerebro-backend-admin
    build:
      context: "./Backend/ContenedorAdmin"
      dockerfile: Dockerfile
    env_file:
      - path: "./Backend/ContenedorAdmin/.env.example"
      - path: "./Backend/ContenedorAdmin/.env"
        required: false
      - path: "./Backend/AuthPersonalTrackingTorneos/api/.env"
    environment:
      CONTENEDOR1_BASE_URL: "${CONTENEDOR1_BASE_URL:-http://cerebro-api:3000/api}"
      CONTENEDOR2_BASE_URL: "${CONTENEDOR2_BASE_URL:-http://backend-pvp:3001}"
      PORT: "3001"
    expose:
      - "3001"
    depends_on:
      - cerebro-api
    restart: unless-stopped

  admin-dashboard:
    container_name: cerebro-admin-dashboard
    build:
      context: "./Diseno/AdminDashboard"
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5052:80"
    depends_on:
      - backend-admin
    restart: unless-stopped

  pvp-simulador:
    container_name: cerebro-pvp-simulador
    build:
      context: "./Diseno/PvP/simulador"
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    restart: unless-stopped
