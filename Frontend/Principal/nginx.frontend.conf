server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        set $api_upstream http://cerebro-api:3000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/pvp/ {
        proxy_pass http://backend-pvp:3001/pvp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/pvp-auth/ {
        proxy_pass http://backend-pvp:3001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/pvp-webhook/ {
        proxy_pass http://backend-pvp:3001/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/webhooks {
        add_header Content-Type application/json;
        return 200 '{"ok":true}';
    }

    location = /api/webhooks/events {
        add_header Content-Type application/json;
        return 200 '{"items":[]}';
    }

    location = /simulation/pvp/api/webhooks {
        add_header Content-Type application/json;
        return 200 '{"ok":true}';
    }

    location = /simulation/pvp/api/webhooks/events {
        add_header Content-Type application/json;
        return 200 '{"items":[]}';
    }

    location = /simulation/pvp {
        return 301 /;
    }

    location = /simulation/pvp/ {
        return 301 /;
    }

    location ^~ /simulation/pvp/ {
        rewrite ^/simulation/pvp/(.*)$ /$1 permanent;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
