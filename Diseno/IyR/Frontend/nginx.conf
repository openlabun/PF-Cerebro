server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Resolve backend container dynamically to avoid stale Docker IPs after recreate.
    location /api/ {
        set $api_upstream http://cerebro-api:3000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
