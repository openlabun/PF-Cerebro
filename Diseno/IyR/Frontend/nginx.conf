server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Resolve backend container dynamically to avoid stale Docker IPs after recreate.
    location /api/ {
        set $api_upstream http://cerebro-api:3000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # PvP lives in Contenedor2 (Nest without global '/api' prefix).
    # Map /api/pvp/* -> http://contenedor2:3001/pvp/*
    location /api/pvp/ {
        proxy_pass http://contenedor2:3001/pvp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Auth endpoints for Contenedor2.
    # Map /api/pvp-auth/* -> http://contenedor2:3001/auth/*
    location /api/pvp-auth/ {
        proxy_pass http://contenedor2:3001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Webhook subscription endpoints for Contenedor2.
    # Map /api/pvp-webhook/* -> http://contenedor2:3001/webhook/*
    location /api/pvp-webhook/ {
        proxy_pass http://contenedor2:3001/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # PvP simulation frontend served by the Vite container.
    location = /simulation/pvp {
        return 301 /simulation/pvp/;
    }

    # Map /simulation/pvp/* -> http://pvp-simulador:3003/*
    location /simulation/pvp/ {
        proxy_pass http://pvp-simulador:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
